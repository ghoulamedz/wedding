<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Wedding Invitation</title>
<link rel="icon" type="image/png" href="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Scheherazade+New:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Aref+Ruqaa:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="envelope-section">
  <div id="env-loader">
    <div class="loader-content" style="text-align:center;">
      <div class="env-loader-ring"></div>
      <div class="env-loader-text"></div>
    </div>
  </div>

  <div class="invitation" id="invitation">
    <div class="env-card">
      <div id="wedding-content">

        <section class="w-section" id="intro">
          <div class="video-fallback"></div>
          <div id="bg-image"></div>
          <div class="petals-layer" id="petals"></div>
          <div class="intro-overlay">
            <div class="basmala" id="basmala"></div>
            <div class="divider-ornament" id="divider-ornament"></div>
            <p class="p1-invite-text" id="invite-prefix" style="margin-bottom:6px;"></p>
            <div class="families-row" id="families-container"></div>
            <p class="p1-invite-text" id="invite-suffix" style="margin:10px 0 4px;"></p>
            <div class="names-main">
              <span class="groom-name" id="groom-name"></span>
              <span class="names-divider">&amp;</span>
              <span class="bride-name" id="bride-name"></span>
            </div>
            <div class="shimmer-line"></div>
          </div>
          <div class="scroll-hint"><span id="scroll-hint-text"></span><div class="scroll-arrow"></div></div>
        </section>

        <section class="w-section" id="countdown-section">
          <div id="countdown-bg-image"></div>
          <div class="countdown-content">
            <div class="section-title" id="cd-title"></div>
            <div class="section-subtitle" id="cd-subtitle"></div>
            <div class="countdown-grid">
              <div class="cd-unit"><div class="cd-box"><span class="cd-number" id="cd-days">00</span></div><span class="cd-label"></span></div>
              <div class="cd-unit"><div class="cd-box"><span class="cd-number" id="cd-hours">00</span></div><span class="cd-label"></span></div>
              <div class="cd-unit"><div class="cd-box"><span class="cd-number" id="cd-mins">00</span></div><span class="cd-label"></span></div>
              <div class="cd-unit"><div class="cd-box"><span class="cd-number" id="cd-secs">00</span></div><span class="cd-label"></span></div>
            </div>
            <div style="width:100%;display:flex;justify-content:center;margin-top:8px;">
              <div class="heart-clock-container">
                <svg class="heart-svg" id="heartClockSvg" viewBox="0 0 260 245" xmlns="http://www.w3.org/2000/svg" style="position:relative;z-index:2;">
                  <path d="M130,218 C130,218 28,155 28,82 C28,50 54,26 82,26 C101,26 118,36 130,50 C142,36 159,26 178,26 C206,26 232,50 232,82 C232,155 130,218 130,218 Z" fill="rgba(253,232,238,0)"/>
                  <g id="hcTicks" stroke="#9a9590" stroke-linecap="round"></g>
                  <g id="hcDots"></g>
                  <line id="hcMHand" x1="130" y1="122" x2="130" y2="74" stroke="#8a8580" stroke-width="3" stroke-linecap="round"/>
                  <line id="hcHHand" x1="130" y1="122" x2="130" y2="90" stroke="#3a3530" stroke-width="5" stroke-linecap="round"/>
                  <line id="hcSHand" x1="130" y1="132" x2="130" y2="66" stroke="#b8b4ae" stroke-width="1.5" stroke-linecap="round"/>
                  <circle cx="130" cy="122" r="6" fill="#3a3530"/>
                  <circle cx="130" cy="122" r="2.8" fill="rgba(255,253,250,0.92)"/>
                </svg>
              </div>
            </div>
            <div class="cd-section-petals" id="cdPetals"></div>
            <div class="scroll-hint-2"><span id="scroll-hint-2-text"></span><div class="scroll-arrow-2"></div></div>
          </div>
        </section>

        <section class="w-section" id="program-section">
          <div class="program-bg"><img src="" alt="" id="programBgImg"></div>
          <div class="program-content">
            <div class="program-header">
              <div class="program-title-script" id="program-title"></div>
              <div class="program-ornament"></div>
            </div>
            <div class="timeline" id="timeline"></div>
          </div>
        </section>

        <section id="closing-section">
          <div class="closing-shimmer" style="width:100px;"></div>
          <div class="closing-names" id="closing-names"></div>
          <div class="closing-tagline" id="closing-tagline"></div>
          <img id="closing-icon" src="" alt="" style="width:clamp(80px,28vw,120px);height:auto;object-fit:contain;margin-top:8px;filter:drop-shadow(0 4px 16px rgba(0,0,0,0.25));">
          <div class="closing-shimmer" style="width:100px;margin-top:10px;"></div>
        </section>

      </div>
    </div>

    <img id="leftPanel" class="left-panel" alt="">
    <img id="rightPanel" class="right-panel" alt="">
    <div class="gold-circle" id="goldCircle" style="display:none;"></div>
    <img id="seal" class="seal" alt="">
    <div class="seal-text" id="sealText">
      <svg viewBox="0 0 200 200">
        <defs>
          <path id="circlePath" d="M100,100 m-46,0 a46,46 0 1,1 92,0 a46,46 0 1,1 -92,0"/>
        </defs>
        <text direction="rtl" text-anchor="middle">
          <textPath href="#circlePath" startOffset="50%" textLength="135" lengthAdjust="spacingAndGlyphs"></textPath>
        </text>
      </svg>
    </div>
  </div>
</div>

<div id="map-modal">
  <div class="map-backdrop" onclick="window.closeMap()"></div>
  <div class="map-sheet">
    <button class="map-close-btn" onclick="window.closeMap()">✕</button>
    <div class="map-sheet-handle"></div>
    <div class="map-sheet-title" id="modal-event-title"></div>
    <div class="map-sheet-address" id="modal-address"></div>
    <div id="leaflet-map" style="display:none;"></div>
    <div id="map-no-coords" class="map-no-coords" style="display:none;"><div class="pin">📍</div><p></p></div>
    <button class="open-maps-btn" id="open-maps-btn" onclick="window.openInMaps()"></button>
  </div>
</div>

<script src="config.js"></script>
<script src="render.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
